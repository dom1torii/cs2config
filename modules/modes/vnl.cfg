// reset previous mode leftovers
unbind 8
unbind 9
unbind 0
unbind x
bind e "+use"
exec modules/movement/movement

// Longjump bind. Press X to reset before jumping.
// Scroll down to use.
// comment out if you dont wanna use it or optionally 
// if you have it uncommented in movement.cfg
exec modules/movement/lj

// Jump
bind mwheeldown "+jump"

// Teleport menu binds
bind 1 "kz_cp"
bind 2 "kz_tp"
bind 3 "kz_prevcp"
bind 4 "kz_nextcp"
bind 5 "kz_undo"
bind 6 "kz_pause"
bind 7 "kz_restart"

// Secondary reset bind
bind r "kz_r"

// Other
bind "c" "noclip; kz_noclip"
