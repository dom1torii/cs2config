// All crosshair types can be found in README.md at https://github.com/dom1torii/cs2config

// Global crosshair color, applies to any crosshair you choose
// move this to file of desired crosshair to have different colors.
cl_crosshaircolor "4"
cl_crosshaircolor_r "0"
cl_crosshaircolor_g "0"
cl_crosshaircolor_b "0"

// Default crosshair
exec modules/crosshair/default

// Dot crosshair
// exec modules/crosshair/dot
