bind space "+jump"
bind mwheeldown "+jump"
bind mwheelup "+jump"
bind ctrl "+duck"
bind shift "+sprint"
bind w "+forward"
bind a "+left"
bind s "+back"
bind d "+right"

// jb (manual crouch, doesnt need a reset bind)
alias +j "jump 1 0 0"
alias -j "jump -999 0 0"
alias +crouch "duck 1 0 0; bind mwheelup +jb"
alias -crouch "duck -999 0 0; bind mwheelup +j"
bind ctrl "+crouch"
bind mwheelup +jb
alias +jb "-duck"
alias -jb "jump 1 0 0; bind mwheelup +j"

