bind space "+jump"
bind mwheeldown "+jump"

// these 2 binds are overridden by jumpbug, comment it out to use these.
bind mwheelup "+jump"
bind ctrl "+duck"

// Jumpbug binds
// Manual crouch, doesnt need a reset bind 
// comment out to stop using
exec modules/movement/jb_manual

// Auto crouch, use alt to reset before every jump
// personally, to me it feels less consistent than manual 
// uncomment to use
// exec modules/movement/jb_auto

// Longjump bind. Press X to reset before jumping.
// Scroll down to use.
// uncomment if you wanna use it and optionally comment it out in modes/vnl.cfg
// exec modules/movement/lj

bind shift "+sprint"
bind w "+forward"
bind a "+left"
bind s "+back"
bind d "+right"

option_duck_method "false"
option_speed_method "false"
