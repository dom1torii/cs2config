// idk what this monstrocity is, please dont touch for your own sake
// cyclevar doesn't work on timescale so i had to improvise

demo_timescale 1

alias timescaleup01 "demo_timescale 0.1; alias timescale_inc timescaleup025; alias timescale_dec timescaledown100"
alias timescaledown01 "demo_timescale 0.1; alias timescale_dec timescaledown100; alias timescale_inc timescaleup025"
alias timescaleup025 "demo_timescale 0.25; alias timescale_inc timescaleup05; alias timescale_dec timescaledown01"
alias timescaledown025 "demo_timescale 0.25; alias timescale_dec timescaledown01; alias timescale_inc timescaleup05"
alias timescaleup05 "demo_timescale 0.5; alias timescale_inc timescaleup075; alias timescale_dec timescaledown025"
alias timescaledown05 "demo_timescale 0.5; alias timescale_dec timescaledown025; alias timescale_inc timescaleup075"
alias timescaleup075 "demo_timescale 0.75; alias timescale_inc timescaleup1; alias timescale_dec timescaledown05"
alias timescaledown075 "demo_timescale 0.75; alias timescale_dec timescaledown05; alias timescale_inc timescaleup1"
alias timescaleup1 "demo_timescale 1; alias timescale_inc timescaleup2; alias timescale_dec timescaledown075"
alias timescaledown1 "demo_timescale 1; alias timescale_dec timescaledown075; alias timescale_inc timescaleup2"
alias timescaleup2 "demo_timescale 2; alias timescale_inc timescaleup3; alias timescale_dec timescaledown1"
alias timescaledown2 "demo_timescale 2; alias timescale_dec timescaledown1; alias timescale_inc timescaleup3"
alias timescaleup3 "demo_timescale 3; alias timescale_inc timescaleup4; alias timescale_dec timescaledown2"
alias timescaledown3 "demo_timescale 3; alias timescale_dec timescaledown2; alias timescale_inc timescaleup4"
alias timescaleup4 "demo_timescale 4; alias timescale_inc timescaleup8; alias timescale_dec timescaledown3"
alias timescaledown4 "demo_timescale 4; alias timescale_dec timescaledown3; alias timescale_inc timescaleup8"
alias timescaleup8 "demo_timescale 8; alias timescale_inc timescaleup16; alias timescale_dec timescaledown4"
alias timescaledown8 "demo_timescale 8; alias timescale_dec timescaledown4; alias timescale_inc timescaleup16"
alias timescaleup16 "demo_timescale 16; alias timescale_inc timescaleup32; alias timescale_dec timescaledown8"
alias timescaledown16 "demo_timescale 16; alias timescale_dec timescaledown8; alias timescale_inc timescaleup32"
alias timescaleup32 "demo_timescale 32; alias timescale_inc timescaleup64; alias timescale_dec timescaledown16"
alias timescaledown32 "demo_timescale 32; alias timescale_dec timescaledown16; alias timescale_inc timescaleup64"
alias timescaleup64 "demo_timescale 64; alias timescale_inc timescaleup100; alias timescale_dec timescaledown32"
alias timescaledown64 "demo_timescale 64; alias timescale_dec timescaledown32; alias timescale_inc timescaleup100"
alias timescaleup100 "demo_timescale 100; alias timescale_inc timescaleup01; alias timescale_dec timescaledown64"
alias timescaledown100 "demo_timescale 100; alias timescale_dec timescaledown64; alias timescale_inc timescaleup01"

alias timescale_inc "timescaleup2"
alias timescale_dec "timescaledown075"

// timescale slower/faster up to 100
bind uparrow "timescale_inc"
bind downarrow "timescale_dec"

// Skip 1 second forwards / backwards
bind rightarrow "demo_gototick +64 relative"
bind leftarrow "demo_gototick -64 relative"

// Pause/unpause demo 
bind e "demo_togglepause"

// Xray toggle
bind x "toggle spec_show_xray 0 1"
