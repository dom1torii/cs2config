// reset previous mode leftovers
unbind 8
unbind 9
unbind 0
unbind x
bind e "+use"
exec modules/movement/movement

// Longjump
alias +lj "duck 1 0 0"
alias -lj "jump 1 0 0; bind mwheeldown +lj2"
alias +lj2 "duck -999 0 0;"
alias -lj2 "jump -999 0 0; bind mwheeldown +jump"

// Reset lj (has sound feedback)
bind x "bind mwheeldown +lj; play sounds/buttons/blip1"

// Jump
bind mwheeldown "+jump"

// Teleport menu binds
bind 1 "kz_cp"
bind 2 "kz_tp"
bind 3 "kz_prevcp"
bind 4 "kz_nextcp"
bind 5 "kz_undo"
bind 6 "kz_pause"
bind 7 "kz_restart"

// Secondary reset bind
bind r "kz_r"

// Other
bind "c" "noclip; kz_noclip"
